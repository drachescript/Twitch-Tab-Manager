<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Twitch Tab Manager</title>
  <style>
    :root {
      --bg: #0b0f15;
      --card: #101722;
      --card-2: #0b1220;
      --border: #1f2937;
      --border-2: #253244;
      --text: #f8fafc;
      --muted: #94a3b8;
      --muted-2: #cbd5e1;
      --accent: #9146FF;
      --accent-2: #a855f7;
      --ok: #86efac;
      --err: #fca5a5;
      --info: #93c5fd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 360px;
      background:
        radial-gradient(circle at top, rgba(145, 70, 255, 0.16), transparent 34%),
        var(--bg);
      color: var(--text);
      font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      padding: 12px;
    }

    .shell {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .version-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(145, 70, 255, 0.18);
      border: 1px solid rgba(145, 70, 255, 0.35);
      color: #d8b4fe;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .subtle {
      color: var(--muted);
      font-size: 12px;
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .state-title {
      margin-top: 2px;
      font-size: 21px;
      font-weight: 800;
    }

    .state-title.is-on { color: #c4b5fd; }
    .state-title.is-off { color: var(--err); }

    .status-copy {
      margin: 10px 0 0;
      color: var(--muted-2);
      font-size: 13px;
    }

    .meta-lines {
      margin-top: 10px;
      display: grid;
      gap: 6px;
    }

    .meta-line {
      font-size: 12px;
      color: var(--muted);
    }

    .meta-line strong {
      color: var(--text);
      font-weight: 700;
    }

    .stats {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat {
      padding: 10px;
      border-radius: 12px;
      background: var(--card-2);
      border: 1px solid #1e293b;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .stat strong {
      font-size: 18px;
      color: var(--text);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
      flex: 0 0 auto;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #243041;
      border-radius: 999px;
      cursor: pointer;
      transition: .2s ease;
      border: 1px solid #334155;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 3px;
      background: #111827;
      border-radius: 50%;
      transition: .2s ease;
    }

    input:checked + .slider {
      background: var(--accent);
      border-color: var(--accent-2);
    }

    input:checked + .slider::before {
      transform: translateX(26px);
      background: #fff;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      appearance: none;
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border-2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: .15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    button:disabled {
      opacity: .6;
      cursor: default;
      transform: none;
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--accent-2) 0%, var(--accent) 100%);
      color: white;
    }

    .btn-secondary {
      background: #172233;
      color: #e5e7eb;
    }

    .flash {
      min-height: 18px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .flash.ok { color: var(--ok); }
    .flash.error { color: var(--err); }
    .flash.info { color: var(--info); }

    .hint {
      margin: 8px 0 0;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }

    body.is-busy .card { opacity: .92; }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card header">
      <div class="title-row">
        <h1>Twitch Tab Manager</h1>
        <span id="popupVersion" class="version-pill">v—</span>
      </div>
      <div class="subtle">Automatic Twitch follow tab manager</div>
    </section>

    <section class="card">
      <div class="hero-top">
        <div>
          <div class="label">Manager</div>
          <div id="stateText" class="state-title">Checking…</div>
        </div>

        <label class="switch" title="Enable or disable Twitch Tab Manager">
          <input type="checkbox" id="toggleManager">
          <span class="slider"></span>
        </label>
      </div>

      <p id="statusText" class="status-copy">Checking current extension state…</p>

      <div class="meta-lines">
        <div class="meta-line">Updated to <strong id="updatedVersion">—</strong></div>
        <div class="meta-line">Last poll <strong id="lastPoll">—</strong></div>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-label">Open</span>
          <strong id="statOpen">—</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Live</span>
          <strong id="statLive">—</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Max</span>
          <strong id="statMax">—</strong>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="actions">
        <button id="btnPoll" class="btn-primary">Force Poll</button>
        <button id="btnReload" class="btn-secondary">Reload Config</button>
        <button id="btnOptions" class="btn-secondary">Open Settings</button>
        <button id="btnDiag" class="btn-secondary">Copy Diagnose</button>
      </div>

      <div id="popupFlash" class="flash" aria-live="polite"></div>

    </section>
    <section id="twitchTabActions" class="popup-card" style="display:none;">
  <div class="card-label">Current Twitch Tab</div>
  <div id="currentTwitchChannel" class="state-title" style="font-size:18px;">—</div>

  <div class="action-grid" style="margin-top:10px;">
    <button id="btnAddFollow" class="btn-secondary">Add to Follows</button>
    <button id="btnAddPriority" class="btn-secondary">Add to Priority</button>
    <button id="btnAddBlacklist" class="btn-secondary">Add to Blacklist</button>
    <button id="btnTempAllow" class="btn-secondary">Temp Allow</button>
  </div>
</section>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
